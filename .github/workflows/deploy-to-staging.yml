# Deploy to Staging
#
# How it works:
# 1. Calls the reusable deploy.yml workflow which builds the site
#    in GitHub Actions and deploys pre-built dist/ to Cloudflare Pages
#    via wrangler (--branch=staging targets the staging environment).
# 2. Verifies the deployment is live on the CF Pages origin URL.
# 3. Fetches any CF Pages deployment logs for debugging.
# 4. Purges Cloudflare CDN cache for inbrowser.dev and verifies
#    the new version is served.
# 5. Deploys Cloudflare Snippets to the staging zone.

name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag or commit to deploy'
        required: true
        type: string

permissions: {}

# CF Pages API returns logs for the entire project (not per-branch),
# so we match deployments by commit SHA in chronological order.
# prevent staging and production deploys from overlapping to avoid
# picking up the wrong deployment's logs.
concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      tag: ${{ inputs.tag }}
      environment: staging
    secrets:
      CF_PAGES_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  # Cloudflare caching setup (configured via Cache Rules in the dashboard):
  # - Edge TTL and Browser TTL are set to 24h for faster cold cache hits
  # - cache key uses resolved host (not request host) and ignores query params,
  #   because every subdomain returns the same HTML+JS service worker
  #   installer/bootstrapper, so a single cached response serves all of them
  #
  # Purge all cached assets after deploy so visitors get the new version
  # without waiting for the 24h TTL to expire.
  purge-cache-and-verify:
    needs: deploy
    # See deploy-to-production.yml for why the purge must not sit behind the
    # happy path.
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Wait for deployment to be live on CF Pages origin
        id: wait-origin
        continue-on-error: true
        timeout-minutes: 9
        run: |
          # check Pages origin directly (bypasses CDN cache)
          ./.github/scripts/wait-for-deploy.sh https://staging.ipfs-service-worker-gateway.pages.dev ${{ inputs.tag }}
      - name: Fetch Cloudflare Pages deployment logs
        if: always()
        run: ./.github/scripts/fetch-cf-pages-logs.sh
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ipfs-service-worker-gateway
          CF_PAGES_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          DEPLOY_COMMIT: ${{ inputs.tag }}
      - name: Purge Cloudflare cache for inbrowser.dev
        if: always()
        timeout-minutes: 2
        run: ./.github/scripts/purge-cache.sh
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_STAGING }}
          CF_TOKEN: ${{ secrets.CF_CACHE_PURGE_TOKEN_STAGING }}
      - name: Purge again once Pages has finished propagating
        if: always()
        timeout-minutes: 3
        run: |
          sleep 60
          ./.github/scripts/purge-cache.sh
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_STAGING }}
          CF_TOKEN: ${{ secrets.CF_CACHE_PURGE_TOKEN_STAGING }}
      - name: Wait for new version to be served via inbrowser.dev
        id: verify
        continue-on-error: true
        timeout-minutes: 5
        run: |
          ./.github/scripts/wait-for-deploy.sh https://inbrowser.dev ${{ inputs.tag }}
      - name: Report whether the deploy went live
        if: always()
        run: |
          failed=0
          if [ "${{ steps.wait-origin.outcome }}" != "success" ]; then
            echo "::error::CF Pages origin never served ${{ inputs.tag }}"
            failed=1
          fi
          if [ "${{ steps.verify.outcome }}" != "success" ]; then
            echo "::error::inbrowser.dev never served ${{ inputs.tag }}, even after two purges"
            failed=1
          fi
          exit "$failed"
  deploy-snippets:
    needs: deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v7
        with:
          node-version: lts/*
      - uses: ipfs/aegir/actions/cache-node-modules@main
      - run: npm run --if-present build
      - name: Deploy Cloudflare Snippets
        run: .github/scripts/deploy-snippets.sh
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID_STAGING }}
          CF_SNIPPETS_TOKEN: ${{ secrets.CF_SNIPPETS_TOKEN_STAGING }}
