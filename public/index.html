<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--

      IPFS Service Worker Gateway
      Build: <%= GIT_VERSION %>

      Your browser fetches and verifies this content, not this server.

      This server only ships a small JavaScript bootstrap. The
      bootstrap installs a Service Worker that uses @helia/verified-fetch
      to pull IPFS blocks directly from peers, check every block against
      its CID, and assemble the response locally.

      Source:  https://github.com/ipfs/service-worker-gateway
      Library: https://www.npmjs.com/package/@helia/verified-fetch


      RUN YOUR OWN IPFS NODE

      This gateway is a convenience, not a replacement. Run your own
      node for better performance, offline access, and to help keep
      content available on the peer-to-peer network:

        https://docs.ipfs.tech/install/


      KNOWN ISSUE: "Save As" saves this HTML page instead of the file

      Clicking "Save As" on a raw file (image, JSON, video, ...) saves
      this bootstrap HTML instead of the actual bytes. This is an
      upstream Chrome / Chromium bug that this project cannot fix.

      Upstream: https://issues.chromium.org/issues/40410035

      If this affects you, star the Chromium issue to help the Chrome
      team prioritize a fix.

    -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPFS Service Worker Gateway | <%= GIT_VERSION %></title>
    <meta name="description" content="A static HTML page that initializes an instance of IPFS Service Worker Gateway" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/ipfs-sw-favicon.ico" type="image/ico"/>
    <link rel="shortcut icon" href="/ipfs-sw-favicon.ico" type="image/x-icon"/>
    <%= PRECONNECT_HINTS %>
    <%= DNS_PREFETCH_HINTS %>
    <style>
      .loading-container {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        pointer-events: none;
      }
      .loading-animation {
        position: fixed;
        width: 250px;
        height: 250px;
        -webkit-animation: heartbeat 1.5s ease-in-out 0s infinite normal both;
        animation: heartbeat 1.5s ease-in-out 0s infinite normal both;
        -webkit-transform-origin: center center;
        transform-origin: center center;
        margin: auto;
        background-size: cover;
        filter: drop-shadow(0 0 0 #378085);
      }
      @keyframes heartbeat {
        0% {
          animation-timing-function: ease-out;
          transform: scale(1);
          transform-origin: center center;
          filter: drop-shadow(0 0 0 #378085);
        }

        45% {
          animation-timing-function: ease-in;
          transform: scale(1);
          filter: drop-shadow(0 0 0rem #378085);
        }

        50% {
          animation-timing-function: ease-in;
          transform: scale(1);
          filter: drop-shadow(0 0 0.5rem #378085);
        }

        55% {
          animation-timing-function: ease-out;
          transform: scale(1);
          /* Size should be increased on drop-shadow so when scaling down, drop-shadow compensates for size reduction, and we don't get any visual artifacts */
          filter: drop-shadow(0 0 1rem #378085);
        }

        67% {
          animation-timing-function: ease-in;
          transform: scale(1.13);
          filter: drop-shadow(0 0 0.75rem #378085);
        }

        83% {
          animation-timing-function: ease-out;
          transform: scale(1.02);
          filter: drop-shadow(0 0 0.50rem #378085);
        }

        90% {
          animation-timing-function: ease-in;
          transform: scale(1.09);
          filter: drop-shadow(0 0 0.75rem #378085);
        }
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
